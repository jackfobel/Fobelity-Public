<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Viseme Face</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      background: #0e0e0e;
      color: #eee;
      font-family: system-ui, sans-serif;
    }

    .wrap {
      max-width: 900px;
      margin: 24px auto;
      padding: 16px;
    }

    .row {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    #face {
      width: 480px;
      height: 360px;
      background: #141414;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }

    .panel {
      flex: 1;
      min-width: 260px;
      background: #141414;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }

    .small {
      font-size: 12px;
      opacity: .8
    }

    button {
      background: #2e2e2e;
      border: 1px solid #3a3a3a;
      padding: 8px 12px;
      border-radius: 10px;
      color: #eee;
      cursor: pointer
    }

      button:hover {
        filter: brightness(1.15)
      }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 240px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Azure Speech → Viseme Face</h2>
    <div class="row">
      <!-- FACE -->
      <svg id="face" viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg">
        <!-- head -->
        <defs>
          <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" />
          </filter>
        </defs>
        <rect x="0" y="0" width="480" height="360" rx="16" fill="#1a1a1a" />
        <ellipse cx="240" cy="180" rx="170" ry="150" fill="#222" />
        <!-- cheeks -->
        <ellipse cx="170" cy="210" rx="36" ry="22" fill="#262626" />
        <ellipse cx="310" cy="210" rx="36" ry="22" fill="#262626" />
        <!-- eyes -->
        <g id="eyes" transform="translate(0,0)">
          <g id="eyeL">
            <ellipse cx="175" cy="145" rx="36" ry="22" fill="#eee" />
            <circle id="pupilL" cx="175" cy="145" r="9" fill="#111" />
            <rect id="lidL" x="139" y="123" width="72" height="0" fill="#1a1a1a" />
          </g>
          <g id="eyeR">
            <ellipse cx="305" cy="145" rx="36" ry="22" fill="#eee" />
            <circle id="pupilR" cx="305" cy="145" r="9" fill="#111" />
            <rect id="lidR" x="269" y="123" width="72" height="0" fill="#1a1a1a" />
          </g>
        </g>
        <!-- eyebrows -->
        <rect id="browL" x="135" y="105" width="80" height="6" rx="3" fill="#333" />
        <rect id="browR" x="265" y="105" width="80" height="6" rx="3" fill="#333" />

        <!-- mouth group -->
        <g id="mouth" transform="translate(240,240)">
          <!-- We’ll switch path data between a few shapes -->
          <path id="mouthPath" d="M -80 0 Q 0 20 80 0 Q 0 10 -80 0 Z" fill="#e33" />
          <!-- shadow -->
          <ellipse id="mouthShadow" cx="0" cy="32" rx="60" ry="10" fill="#000" opacity=".25" filter="url(#soft)" />
        </g>
      </svg>

      <!-- INFO -->
      <div class="panel">
        <div>Last viseme: <b id="vId">—</b></div>
        <div>Time (ms): <b id="vMs">—</b></div>
        <div class="small" style="margin-top:6px;">Tip: open this page before the server speaks, or use the “wait for client” option on the server.</div>
        <div style="margin-top:12px; display:flex; gap:8px;">
          <button id="center">Center Eyes</button>
          <button id="idle">Idle Demo (5s)</button>
        </div>
        <h3 style="margin:16px 0 8px">Raw events</h3>
        <pre id="log"></pre>
        <h3 style="margin:16px 0 8px">SVG Animation (from SDK, if present)</h3>
        <div id="svgHost" class="panel" style="padding:8px;"></div>
      </div>
    </div>
  </div>

  <!-- SignalR client -->
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script>
    // ------- helpers -------
    const lerp = (a, b, t) => a + (b - a) * t;
    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const log = (m) => { const el = document.getElementById('log'); el.textContent += m + "\n"; el.scrollTop = el.scrollHeight; };

    // ------- face refs -------
    const mouthPath = document.getElementById('mouthPath');
    const mouthGroup = document.getElementById('mouth');
    const pupilL = document.getElementById('pupilL');
    const pupilR = document.getElementById('pupilR');
    const lidL = document.getElementById('lidL');
    const lidR = document.getElementById('lidR');
    const browL = document.getElementById('browL');
    const browR = document.getElementById('browR');

    // mouth shapes by category (very simple but effective)
    const MOUTH = {
      rest: "M -80 0 Q 0  8  80 0 Q 0  4 -80 0 Z", // closed
      small: "M -80 0 Q 0 14  80 0 Q 0  8 -80 0 Z", // small open
      mid: "M -84 0 Q 0 28  84 0 Q 0 14 -84 0 Z", // mid open
      wide: "M -90 0 Q 0 44  90 0 Q 0 18 -90 0 Z", // wide open
      o: "M -40 0 C -40 40 40 40 40 0 C 40 -40 -40 -40 -40 0 Z" // rounded (ooo)
    };

    // map Azure visemeId -> a shape key
    // (IDs differ by voice; this grouping is generic and looks good)
    function visemeToShape(id) {
      if ([0, 1, 2, 3].includes(id)) return 'rest';     // silences & lip-closed sounds
      if ([4, 5, 6, 7].includes(id)) return 'small';    // soft vowels/consonants
      if ([8, 9, 10].includes(id)) return 'mid';       // most vowels
      if ([11, 12, 13].includes(id)) return 'wide';    // “ah/ae” or strong consonants
      if ([14, 15, 16].includes(id)) return 'o';       // rounded lips (“oh/oo”)
      return 'small';
    }

    let targetMouth = MOUTH.rest;
    let mouthD = MOUTH.rest;
    let headBob = 0;

    // idle blink loop
    let blinking = false;
    function blinkOnce() {
      if (blinking) return;
      blinking = true;
      const dur = 130;
      const openH = 0, closedH = 22;
      lidL.setAttribute('height', closedH);
      lidR.setAttribute('height', closedH);
      setTimeout(() => { lidL.setAttribute('height', openH); lidR.setAttribute('height', openH); blinking = false; }, dur);
    }
    setInterval(() => { if (Math.random() < 0.08) blinkOnce(); }, 400);

    // eye saccades (subtle)
    setInterval(() => {
      const dx = (Math.random() * 2 - 1) * 6, dy = (Math.random() * 2 - 1) * 3;
      pupilL.setAttribute('cx', 175 + dx); pupilL.setAttribute('cy', 145 + dy);
      pupilR.setAttribute('cx', 305 + dx); pupilR.setAttribute('cy', 145 + dy);
    }, 700);

    // head bob while speaking
    function setSpeaking(on) {
      headBob = on ? 1 : 0;
    }

    // animation loop
    function tick() {
      // smooth mouth interpolation (string → we snap when shape changes, but we ease vertical bob)
      if (mouthD !== targetMouth) {
        mouthD = targetMouth;
        mouthPath.setAttribute('d', mouthD);
      }
      // tiny bob when speaking
      const bob = headBob ? 2 : 0;
      const y = lerp(+mouthGroup.getAttribute('data-y') || 0, bob, 0.25);
      mouthGroup.setAttribute('transform', `translate(240,${240 + y})`);
      mouthGroup.setAttribute('data-y', y);

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // controls
    document.getElementById('center').onclick = () => {
      pupilL.setAttribute('cx', 175); pupilL.setAttribute('cy', 145);
      pupilR.setAttribute('cx', 305); pupilR.setAttribute('cy', 145);
    };
    document.getElementById('idle').onclick = () => {
      targetMouth = MOUTH.small;
      setSpeaking(true);
      setTimeout(() => { targetMouth = MOUTH.rest; setSpeaking(false); }, 5000);
    };

    // connect SignalR
    const connection = new signalR.HubConnectionBuilder()
      .withUrl("/visemeHub")
      .withAutomaticReconnect()
      .build();

    connection.on("viseme", ev => {
      // ev: { id (uint), ms, animation? }
      document.getElementById('vId').textContent = ev.id;
      document.getElementById('vMs').textContent = Math.round(ev.ms);

      // Prefer server-provided SVG animation when available
      const host = document.getElementById('svgHost');
      if (ev.animation && ev.animation.includes("<svg")) {
        host.innerHTML = ev.animation; // SDK’s facial animation
      } else {
        // fallback to our handcrafted viseme mapping
        const key = visemeToShape(ev.id);
        targetMouth = MOUTH[key] || MOUTH.small;
      }
      setSpeaking(true);
      log(JSON.stringify(ev));
      // auto stop speaking after a short quiet window
      clearTimeout(window._speakTimer);
      window._speakTimer = setTimeout(() => setSpeaking(false), 180);
    });

    connection.start()
      .then(() => log("Connected to /visemeHub"))
      .catch(err => log("SignalR error: " + err));
  </script>
</body>
</html>
